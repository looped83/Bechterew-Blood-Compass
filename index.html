/* ── DATA STORE (Einzel-Bericht) ── */
const Store={
  KEY:'bbc-single-v1',
  getReport(){const r=localStorage.getItem(this.KEY);return r?JSON.parse(r):null},
  setReport(r){localStorage.setItem(this.KEY,JSON.stringify(r))},
  clearReport(){localStorage.removeItem(this.KEY)},
  exportJSON(){const r=this.getReport();if(!r){toast('Kein Bericht vorhanden',true);return}const b=new Blob([JSON.stringify(r,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='laborbericht.json';a.click();URL.revokeObjectURL(u)},
  importJSON(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.datum||!d.werte)throw new Error('Ungültiges Format');this.setReport(d);res(d)}catch(err){rej(err)}};r.readAsText(f)})}
};

/* ── PDF PARSER ── */
const Parser={
  async parsePDF(file){
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let text='';let totalItems=0;
    for(let i=1;i<=pdf.numPages;i++){
      const pg=await pdf.getPage(i);
      const c=await pg.getTextContent();
      const items=[...c.items].filter(it=>it.str.trim().length>0)
        .sort((a,b)=>Math.abs(b.transform[5]-a.transform[5])>8?b.transform[5]-a.transform[5]:a.transform[4]-b.transform[4]);
      totalItems+=items.length;
      let lastY=null,lastX=0,lastW=0;
      for(const it of items){
        const y=it.transform[5],x=it.transform[4],w=it.width||it.str.length*6;
        if(lastY===null){text+=it.str}
        else if(Math.abs(y-lastY)>8){text+='\n'+it.str;lastX=0;lastW=0}
        else{text+=(x-(lastX+lastW)>15?'  ':' ')+it.str}
        lastY=y;lastX=x;lastW=w;
      }
      text+='\n\n';
    }
    const isImagePDF=totalItems<10;
    console.log('[BBC] Seiten:',pdf.numPages,'TextItems:',totalItems,'Bildbasiert:',isImagePDF);
    console.log('[BBC] PDF-Text:\n'+text);
    const werte=isImagePDF?{}:this.extractValues(text);
    console.log('[BBC] Erkannte Werte:',Object.keys(werte).length,werte);
    return{text,isImagePDF,datum:this.findDate(text),quelle:this.findQuelle(text),werte};
  },
  findDate(t){
    const pats=[/Befunddatum[:\s]*(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})/i,/Eingangsdatum[:\s]*(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})/i,/Entnahmedatum[:\s]*(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})/i,/Probeneingang[:\s]*(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})/i,/Datum[:\s]*(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})/i,/(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})/];
    for(const p of pats){const m=t.match(p);if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0')}
    return new Date().toISOString().slice(0,10);
  },
  findQuelle(t){
    const m=t.match(/(?:Labor|Laborgemeinschaft|Charit[eé]|MVZ|Arztpraxis|Klinik|Universität)[^\n]{0,60}/i);
    return m?m[0].trim().slice(0,60):'Unbekanntes Labor';
  },
  extractValues(text){
    const res={};
    const lines=text.split('\n');
    for(const[key,def]of Object.entries(PARAMS)){
      for(const pat of def.parse){
        let found=false;
        const sp=pat.includes('.*')?pat.split('.*')[0]:pat;
        for(let li=0;li<lines.length;li++){
          const lo=lines[li].toLowerCase();
          if(!lo.includes(sp))continue;
          // Try: (1) after keyword on same line, (2) whole same line, (3) next line
          const pi=lo.indexOf(sp)+sp.length;
          const searches=[
            {src:lines[li].slice(pi),ctx:lines[li]},     // after keyword
            {src:lines[li],ctx:lines[li]},                // whole line (value before name)
            {src:li+1<lines.length?lines[li+1]:'',ctx:lines[li]+(li+1<lines.length?' '+lines[li+1]:'')}  // next line
          ];
          for(const{src,ctx}of searches){
            if(!src)continue;
            const nm=src.match(/(-?\d+[.,]\d+|-?\d{1,4}(?![.\d]))/);
            if(!nm)continue;
            const raw=nm[0].replace(',','.');
            const val=parseFloat(raw);
            if(isNaN(val))continue;
            // Skip obvious dates/years
            if(val>1900&&val<2100&&nm[0].length===4)continue;
            let unit='',referenz='',flag='normal';
            const aft=src.slice(nm.index+nm[0].length);
            const um=aft.match(/^\s*([a-zA-Zµμ\/%°]+(?:\/[a-zA-Z0-9]+)*)/);
            if(um)unit=um[1];
            const rm=aft.match(/(\d+[.,]?\d*\s*[-–]\s*\d+[.,]?\d*)/)||aft.match(/([<>≤≥]\s*\d+[.,]?\d*)/);
            if(rm)referenz=rm[1].replace(/,/g,'.');
            if(referenz)flag=this.determineFlag(val,referenz);
            const fm=ctx.match(/(^|[\s(])(H|HH|L|LL|hoch|niedrig|erh[öo]ht|erniedrigt|pathologisch|↑|↓|\*)([\s)$])/i);
            if(fm){const f=fm[2].toLowerCase();if(['h','hh','hoch','erhöht','erhoeht','pathologisch','↑'].some(x=>f===x))flag='erhoeht';if(['l','ll','niedrig','erniedrigt','↓'].some(x=>f===x))flag='niedrig'}
            if(!res[key])res[key]={wert:val,einheit:unit||def.unit,referenz,flag};
            found=true;break;
          }
          if(found)break;
        }
        if(found)break;
      }
    }
    return res;
  },
  determineFlag(val,ref){
    ref=ref.replace(',','.').trim();
    let lo=-Infinity,hi=Infinity;
    const rm=ref.match(/(\d+\.?\d*)\s*[-–]\s*(\d+\.?\d*)/);
    if(rm){lo=parseFloat(rm[1]);hi=parseFloat(rm[2])}
    else if(ref.startsWith('<')||ref.startsWith('≤'))hi=parseFloat(ref.replace(/^[<≤]\s*/,''));
    else if(ref.startsWith('>')||ref.startsWith('≥'))lo=parseFloat(ref.replace(/^[>≥]\s*/,''));
    else if(ref.match(/^bis\s/i))hi=parseFloat(ref.replace(/^bis\s*/i,''));
    else if(ref.match(/^ab\s/i))lo=parseFloat(ref.replace(/^ab\s*/i,''));
    if(val<lo)return'niedrig';if(val>hi)return'erhoeht';return'normal';
  }
};

/* ── ANALYZER ── */
const Analyzer={
  analyze(report){
    if(!report)return null;
    return{ampel:this.computeAmpel(report),scores:this.computeScores(report),fazit:this.genFazit(report),empfehlungen:this.genEmpf(report),fragen:this.genFragen(report),positiv:this.genPositiv(report)};
  },
  computeAmpel(r){
    const g=[],y=[],rd=[];
    for(const[k,v]of Object.entries(r.werte)){
      const d=PARAMS[k];if(!d)continue;
      if(v.flag==='normal'||v.flag==='negativ'){g.push(d.name);continue}
      const s=d.sev&&typeof v.wert==='number'?d.sev(v.wert):null;
      if(s==='alert')rd.push(d.name);else y.push(d.name);
    }
    return{green:g,yellow:y,red:rd};
  },
  computeScores(report){
    const scores=[],w=report.werte;
    const total=Object.keys(w).length,norm=Object.values(w).filter(v=>v.flag==='normal'||v.flag==='negativ').length;
    const p=total?Math.round(norm/total*100):0;
    scores.push({label:'Normalwerte',value:p+'%',pct:p,color:p>=80?'var(--good)':p>=60?'var(--watch)':'var(--alert)',note:norm+' von '+total+' im Referenzbereich'});
    let inf=100;
    if(w.crp&&w.crp.flag==='erhoeht')inf-=30;if(w.bsg&&w.bsg.flag==='erhoeht')inf-=20;
    inf=Math.max(0,Math.min(100,inf));
    scores.push({label:'Entzündungskontrolle',value:inf+'%',pct:inf,color:inf>=70?'var(--good)':inf>=40?'var(--watch)':'var(--alert)',note:inf>=70?'Gut kontrolliert':'Entzündungszeichen vorhanden'});
    return scores;
  },
  genFazit(report){
    const items=[],w=report.werte;
    const total=Object.keys(w).length,norm=Object.values(w).filter(v=>v.flag==='normal'||v.flag==='negativ').length;
    items.push(Math.round(norm/total*100)+'% der Laborwerte ('+norm+' von '+total+') liegen im Referenzbereich.');
    if(w.crp){if(w.crp.flag==='erhoeht')items.push('CRP erhöht ('+w.crp.wert+' '+w.crp.einheit+') — möglicherweise Hinweis auf entzündliche Aktivität oder infektbedingt.');else items.push('CRP im Normbereich ('+w.crp.wert+' '+w.crp.einheit+') — kein Hinweis auf akute Entzündung.')}
    if(w.haemoglobin&&w.haemoglobin.flag==='niedrig')items.push('Hämoglobin leicht erniedrigt ('+w.haemoglobin.wert+' '+w.haemoglobin.einheit+'). Bei chronisch-entzündlichen Erkrankungen nicht ungewöhnlich.');
    if(w.tsh&&w.tsh.flag==='normal')items.push('Schilddrüsenfunktion (TSH) unauffällig.');
    if(w.vitamin_d&&w.vitamin_d.flag==='normal')items.push('Vitamin-D-Spiegel im optimalen Bereich.');
    return items;
  },
  genEmpf(report){
    const items=[],w=report.werte;
    if(w.haemoglobin&&w.haemoglobin.flag==='niedrig')items.push({title:'Hämoglobin beobachten',text:'Leicht erniedrigtes Hämoglobin. Nächste Kontrolle abwarten und mit dem Arzt besprechen.'});
    if(w.crp&&w.crp.flag==='erhoeht')items.push({title:'CRP-Erhöhung abklären',text:'Erhöhtes CRP kann auf Infektion oder Entzündungsschub hinweisen. Mit dem Rheumatologen besprechen.'});
    if(w.glucose&&w.glucose.flag==='niedrig')items.push({title:'Glucose beobachten',text:'Nüchternglukose leicht unter dem Referenzbereich. Häufig methodenbedingt.'});
    if(w.vitamin_d&&typeof w.vitamin_d.wert==='number'&&w.vitamin_d.wert<50)items.push({title:'Vitamin D supplementieren',text:'Vitamin-D-Spiegel unter dem empfohlenen Bereich. Bei Morbus Bechterew besonders wichtig.'});
    if(w.kreatinin&&w.kreatinin.flag==='niedrig')items.push({title:'Kreatinin beobachten',text:'Leicht erniedrigtes Kreatinin ist meist unbedenklich. Regelmäßige Kontrolle empfohlen.'});
    if(w.beta_globulin_pct&&w.beta_globulin_pct.flag==='erhoeht')items.push({title:'Beta-Globulin erhöht',text:'Kann bei chronisch-entzündlichen Erkrankungen vorkommen. Verlaufskontrolle empfohlen.'});
    if(!items.length)items.push({title:'Weiter so',text:'Keine akut auffälligen Befunde. Regelmäßige Kontrollen beibehalten.'});
    return items;
  },
  genFragen(report){
    const items=[],w=report.werte;
    if(w.crp&&w.crp.flag==='erhoeht')items.push('CRP-Erhöhung: Ist dies mit der Grunderkrankung vereinbar oder sollte eine Infektabklärung erfolgen?');
    if(w.haemoglobin&&w.haemoglobin.flag==='niedrig')items.push('Hämoglobin leicht erniedrigt — ist eine weiterführende Anämie-Diagnostik sinnvoll?');
    if(w.glucose&&w.glucose.flag==='niedrig')items.push('Nüchternglukose leicht unter dem Referenzbereich — klinisch relevant?');
    if(w.erythrozyten&&w.erythrozyten.flag==='niedrig')items.push('Erythrozyten unterhalb der Norm — Zusammenhang mit Biologika-Therapie?');
    items.push('Sind die aktuellen Kontrollintervalle weiterhin angemessen?');
    return items;
  },
  genPositiv(report){
    const items=[],w=report.werte;
    if(w.tsh&&w.tsh.flag==='normal')items.push('Schilddrüsenfunktion stabil im Normbereich.');
    if(w.vitamin_d&&w.vitamin_d.flag==='normal')items.push('Vitamin-D-Versorgung gut — wichtig für die Knochengesundheit.');
    if(w.gpt&&w.gpt.flag==='normal'&&w.got&&w.got.flag==='normal')items.push('Leberwerte unauffällig trotz Biologika-Therapie.');
    if(w.egfr&&w.egfr.flag==='normal')items.push('Nierenfunktion (eGFR) stabil im Normbereich.');
    return items;
  }
};

/* ── UI ── */
const UI={
  render(){
    const report=Store.getReport(),an=report?Analyzer.analyze(report):null,app=document.getElementById('app');
    app.innerHTML=this.renderHeader(report)+this.renderUpload(report);
    if(!an){app.innerHTML+='<div class="empty-state"><p>Noch kein Laborbericht vorhanden. Lade dein aktuelles PDF hoch.</p></div>'}
    else{app.innerHTML+=this.renderFazit(an)+this.renderAmpel(an)+this.renderScores(an)+this.renderTable(report)+this.renderEmpf(an)+this.renderFragen(an)+this.renderPositiv(an)+this.renderSelbst()}
    app.innerHTML+=this.renderDisclaimer();
    this.bind();
  },
  renderHeader(report){
    let dateStr='';
    if(report){const[y,m,d]=report.datum.split('-');dateStr='<div class="header-dates"><span class="date-chip">'+d+'.'+m+'.'+y+'</span></div>'}
    return'<div class="header"><div class="header-eyebrow">Bechterew Blood Compass</div><h1>Persönliche Blutanalyse</h1><div class="header-sub">Axiale Spondyloarthritis — Adalimumab-Therapie</div>'+dateStr+'</div>';
  },
  renderUpload(report){
    const hasReport=!!report;
    let h='<div class="upload-section"><div class="section-head"><span class="icon">📂</span> Laborbericht verwalten</div>'
      +'<div class="upload-zone" id="dropZone"><div class="upload-zone-icon">📄</div><div class="upload-zone-text">'+(hasReport?'Neues PDF hochladen (ersetzt aktuellen Bericht)':'PDF-Laborbericht hier ablegen oder klicken')+'</div><div class="upload-zone-hint">PDF-Dateien mit deutschen Laborwerten</div><input type="file" class="upload-input" id="fileInput" accept=".pdf"></div>';
    if(hasReport){
      const[y,m,d]=report.datum.split('-');

        +'<div class="data-actions"><button class="btn" id="btnExport">Export (JSON)</button><button class="btn" id="btnImport">Import</button><input type="file" id="importInput" accept=".json" style="display:none"></div>';
    }
    return h+'</div>';
  },
  renderFazit(an){return'<div class="section"><div class="section-head"><span class="icon">📋</span> Kurzfazit</div><div class="fazit"><ul>'+an.fazit.map(f=>'<li>'+f+'</li>').join('')+'</ul></div></div>'},
  renderAmpel(an){
    const{green:g,yellow:y,red:r}=an.ampel;
    return'<div class="section"><div class="section-head"><span class="icon">🚦</span> Ampelübersicht</div><div class="ampel-grid">'
      +'<div class="ampel-col"><div class="ampel-col-head"><span class="dot dot-green"></span> Im Normbereich ('+g.length+')</div><ul>'+g.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>'
      +'<div class="ampel-col"><div class="ampel-col-head"><span class="dot dot-yellow"></span> Beobachten ('+y.length+')</div><ul>'+(y.length?y.map(x=>'<li>'+x+'</li>').join(''):'<li style="color:var(--ink-3)">Keine</li>')+'</ul></div>'
      +'<div class="ampel-col"><div class="ampel-col-head"><span class="dot dot-red"></span> Auffällig ('+r.length+')</div><ul>'+(r.length?r.map(x=>'<li>'+x+'</li>').join(''):'<li style="color:var(--ink-3)">Keine</li>')+'</ul></div>'
      +'</div></div>';
  },
  renderScores(an){
    if(!an.scores.length)return'';
    let h='<div class="section"><div class="section-head"><span class="icon">🎯</span> Gesundheitsscores</div><div class="score-grid">';
    for(const s of an.scores)h+='<div class="score-card"><div class="score-label">'+s.label+'</div><div class="score-value" style="color:'+s.color+'">'+s.value+'</div><div class="score-bar-track"><div class="score-bar-fill" style="width:'+s.pct+'%;background:'+s.color+'"></div></div><div class="score-note">'+s.note+'</div></div>';
    return h+'</div></div>';
  },
  renderTable(report){
    let h='<div class="section"><div class="section-head"><span class="icon">🧬</span> Detaillierte Laborwerte</div>';
    for(const cat of CATEGORIES){
      const pInCat=Object.entries(PARAMS).filter(([,v])=>v.cat===cat.key);
      if(!pInCat.some(([k])=>report.werte[k]))continue;
      h+='<div class="subsection-head">'+cat.icon+' '+cat.name+'</div><div class="table-wrap"><table class="detail-table"><thead><tr><th>Parameter</th><th>Wert</th><th>Einheit</th><th>Referenz</th><th>Status</th></tr></thead><tbody>';
      for(const[key,def]of pInCat){
        const v=report.werte[key];if(!v)continue;
        const f=v.flag;
        h+='<tr><td>'+def.name+'</td><td class="val">'+(typeof v.wert==='number'?v.wert:v.wert)+'</td><td style="color:var(--ink-3)">'+v.einheit+'</td><td style="font-size:0.75rem;color:var(--ink-3)">'+v.referenz+'</td><td>'+(f==='normal'||f==='negativ'?'<span class="tag tag-good">Normal</span>':f==='erhoeht'?'<span class="tag tag-alert">Erhöht</span>':'<span class="tag tag-watch">Niedrig</span>')+'</td></tr>';
      }
      h+='</tbody></table></div>';
    }
    return h+'</div>';
  },
  renderEmpf(an){
    if(!an.empfehlungen.length)return'';
    let h='<div class="section"><div class="section-head"><span class="icon">📝</span> Empfehlungen</div><div class="rec-list">';
    for(const r of an.empfehlungen)h+='<div class="rec-card"><div class="rec-card-head">'+r.title+'</div><p>'+r.text+'</p></div>';
    return h+'</div></div>';
  },
  renderFragen(an){
    if(!an.fragen.length)return'';
    return'<div class="section"><div class="section-head"><span class="icon">💬</span> Fragen an den Rheumatologen</div><div class="fazit"><ul>'+an.fragen.map(f=>'<li>'+f+'</li>').join('')+'</ul></div></div>';
  },
  renderPositiv(an){
    if(!an.positiv.length)return'';
    return'<div class="section"><div class="section-head"><span class="icon">✅</span> Positive Entwicklungen</div><div class="fazit"><ul>'+an.positiv.map(p=>'<li>'+p+'</li>').join('')+'</ul></div></div>';
  },
  renderSelbst(){
    return'<div class="section"><div class="section-head"><span class="icon">🔍</span> Selbstmonitoring</div><div class="rec-list">'
      +'<div class="rec-card"><div class="rec-card-head">Regelmäßige Blutkontrollen</div><p>Alle 3–6 Monate Blutbild, CRP, Leber- und Nierenwerte kontrollieren lassen.</p></div>'
      +'<div class="rec-card"><div class="rec-card-head">Körpersignale beachten</div><p>Ungewöhnte Müdigkeit, Infektanfälligkeit oder Blutungsneigung können auf Veränderungen hinweisen.</p></div>'
      +'<div class="rec-card"><div class="rec-card-head">BASDAI-Tagebuch</div><p>Regelmäßige Dokumentation des BASDAI-Scores hilft, den Therapieerfolg zu objektivieren.</p></div>'
      +'</div></div>';
  },
  renderDisclaimer(){
    return'<div class="section"><div class="disclaimer"><strong>Wichtiger Hinweis:</strong> Diese Analyse dient ausschließlich der persönlichen Orientierung und ersetzt keine ärztliche Beratung. Alle Bewertungen basieren auf allgemeinen Referenzbereichen. Bitte besprechen Sie alle Ergebnisse mit Ihrem Rheumatologen. Änderungen an der Medikation nur in Absprache mit dem Arzt. Die PDF-Analyse erfolgt lokal in Ihrem Browser — Ihre Daten werden nicht an Server gesendet.</div></div>';
  },
  bind(){
    const dz=document.getElementById('dropZone'),fi=document.getElementById('fileInput');
    if(dz&&fi){
      dz.addEventListener('click',()=>fi.click());
      dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
      dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
      dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFiles(e.dataTransfer.files)});
      fi.addEventListener('change',e=>{if(e.target.files.length)handleFiles(e.target.files)});
    }
    const bDel=document.getElementById('btnDelete');
    if(bDel)bDel.addEventListener('click',()=>{if(confirm('Aktuellen Bericht entfernen?')){Store.clearReport();toast('Bericht entfernt');UI.render()}});
    const bE=document.getElementById('btnExport');if(bE)bE.addEventListener('click',()=>{Store.exportJSON();toast('Export gestartet')});
    const bI=document.getElementById('btnImport'),iI=document.getElementById('importInput');
    if(bI&&iI){bI.addEventListener('click',()=>iI.click());iI.addEventListener('change',async e=>{if(!e.target.files.length)return;try{await Store.importJSON(e.target.files[0]);toast('Import erfolgreich');UI.render()}catch(err){toast('Import fehlgeschlagen: '+err.message,true)}})}
  }
};

/* ── FILE HANDLING ── */
async function handleFiles(files){
  const file=files[0];if(!file)return;
  if(file.type!=='application/pdf'){toast('Nur PDF-Dateien',true);return}
  const dz=document.getElementById('dropZone');
  dz.innerHTML='<span class="spinner"></span> Analysiere '+file.name+'...';
  try{const result=await Parser.parsePDF(file);showReview(result,file.name)}
  catch(err){toast('Fehler: '+err.message,true)}
  dz.innerHTML='<div class="upload-zone-icon">📄</div><div class="upload-zone-text">PDF-Laborbericht hier ablegen oder klicken</div><div class="upload-zone-hint">PDF-Dateien mit deutschen Laborwerten</div>';
}

function showReview(result,fname){
  const ov=document.getElementById('reviewOverlay'),mo=document.getElementById('reviewModal');
  const cnt=Object.keys(result.werte).length;
  let h='<h2>Laborwerte prüfen &amp; eintragen</h2>';
  if(result.isImagePDF){
    h+='<div style="background:var(--tag-alert-bg);border:1px solid var(--alert);border-radius:6px;padding:0.85rem 1rem;margin-bottom:1rem;font-size:0.82rem;">'
      +'<strong style="color:var(--alert)">Gescannte (bildbasierte) PDF erkannt.</strong><br>'
      +'Diese PDF enthält keinen maschinenlesbaren Text — sie ist ein Scan oder ein Bild. Eine automatische Texterkennung (OCR) ist im Browser nicht möglich.<br><br>'
      +'<strong>Was tun?</strong> Bitte trage die Werte unten manuell ein, oder frage dein Labor ob du die Werte als textbasierte PDF oder direkt digital erhältst.</div>';
  } else if(cnt===0){
    const previewText=result.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').trim().slice(0,3000)||'(kein Text gefunden)';
    h+='<div style="background:var(--tag-watch-bg);border:1px solid var(--watch);border-radius:6px;padding:0.85rem 1rem;margin-bottom:1rem;font-size:0.82rem;">'
      +'<strong style="color:var(--watch)">Text extrahiert, aber keine bekannten Laborwerte erkannt.</strong> Das PDF-Format deines Labors ist noch nicht eingestellt. '
      +'Klappe den Text unten auf, kopiere ihn und schicke ihn — dann passe ich den Parser an dein Labor an.<br>'
      +'<details style="margin-top:0.6rem"><summary style="cursor:pointer;color:var(--accent);font-weight:600">Extrahierten Text anzeigen</summary>'
      +'<textarea readonly style="width:100%;height:200px;margin-top:0.5rem;font-size:0.68rem;font-family:monospace;background:var(--surface);color:var(--ink);border:1px solid var(--border);border-radius:4px;padding:0.5rem;resize:vertical;white-space:pre">'+previewText+'</textarea>'
      +'</details></div>';
  } else {
    h+='<p style="font-size:0.8rem;color:var(--ink-2);margin-bottom:1rem">'+fname+' — <strong>'+cnt+' Werte erkannt</strong></p>';
  }
  h+='<div class="modal-meta"><div><label>Datum</label><input type="date" id="rvDatum" value="'+result.datum+'"></div><div><label>Labor / Quelle</label><input type="text" id="rvQuelle" value="'+(result.quelle||'')+'"></div></div>'
    +'<div class="modal-values"><table><thead><tr><th></th><th>Parameter</th><th>Wert</th><th>Einheit</th><th>Referenz</th><th>Status</th></tr></thead><tbody>';
  const entries=Object.entries(PARAMS).sort((a,b)=>{const af=result.werte[a[0]]?0:1,bf=result.werte[b[0]]?0:1;return af-bf});
  for(const[key,def]of entries){
    const v=result.werte[key],ck=v?'checked':'',op=v?'':'style="opacity:0.4"';
    h+='<tr '+op+'><td><input type="checkbox" data-key="'+key+'" '+ck+'></td><td>'+def.name+'</td>'
      +'<td><input type="text" data-f="wert" data-k="'+key+'" value="'+(v?v.wert:'')+'" style="width:70px"></td>'
      +'<td><input type="text" data-f="einheit" data-k="'+key+'" value="'+(v?v.einheit:def.unit)+'" style="width:60px"></td>'
      +'<td><input type="text" data-f="referenz" data-k="'+key+'" value="'+(v?v.referenz:'')+'" style="width:80px"></td>'
      +'<td>'+(v?'<span class="tag '+(v.flag==='normal'||v.flag==='negativ'?'tag-good':v.flag==='erhoeht'?'tag-alert':'tag-watch')+'">'+(v.flag==='normal'?'Normal':v.flag==='erhoeht'?'Erhöht':v.flag==='niedrig'?'Niedrig':'Neg.')+'</span>':'')+'</td></tr>';
  }
  h+='</tbody></table></div><div class="modal-footer"><button class="btn" id="rvCancel">Abbrechen</button><button class="btn btn-primary" id="rvSave">Speichern</button></div>';
  mo.innerHTML=h;ov.hidden=false;
  document.getElementById('rvCancel').addEventListener('click',()=>{ov.hidden=true});
  ov.addEventListener('click',e=>{if(e.target===ov)ov.hidden=true});
  document.getElementById('rvSave').addEventListener('click',()=>{
    const datum=document.getElementById('rvDatum').value,quelle=document.getElementById('rvQuelle').value,werte={};
    mo.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
      if(!cb.checked)return;const k=cb.dataset.key;
      const wI=mo.querySelector('input[data-f="wert"][data-k="'+k+'"]');
      const eI=mo.querySelector('input[data-f="einheit"][data-k="'+k+'"]');
      const rI=mo.querySelector('input[data-f="referenz"][data-k="'+k+'"]');
      const raw=wI.value.trim().replace(',','.');const num=parseFloat(raw);const wV=isNaN(num)?raw:num;
      const ref=rI.value.trim();let flag='normal';
      if(typeof wV==='number'&&ref)flag=Parser.determineFlag(wV,ref);
      werte[k]={wert:wV,einheit:eI.value.trim(),referenz:ref,flag};
    });
    if(!Object.keys(werte).length){toast('Keine Werte ausgewählt',true);return}
    Store.setReport({datum,quelle,werte});ov.hidden=true;
    toast(Object.keys(werte).length+' Werte gespeichert');UI.render();
  });
}

function toast(msg,err=false){
  const c=document.getElementById('toasts'),el=document.createElement('div');
  el.className='toast'+(err?' toast-error':'');el.textContent=msg;c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300)},3000);
}

/* ── THEME ── */
(function(){
  const btn=document.getElementById('themeToggle');
  const st=localStorage.getItem('bbc-theme');if(st)document.documentElement.setAttribute('data-theme',st);
  function upd(){const dk=document.documentElement.getAttribute('data-theme')==='dark'||(!document.documentElement.getAttribute('data-theme')&&window.matchMedia('(prefers-color-scheme:dark)').matches);btn.textContent=dk?'☀️':'🌙'}
  upd();btn.addEventListener('click',()=>{const c=document.documentElement.getAttribute('data-theme');const dk=c==='dark'||(!c&&window.matchMedia('(prefers-color-scheme:dark)').matches);const n=dk?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('bbc-theme',n);upd()});
})();

UI.render();
</script>
</body>
</html>
